name: Deploy production backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  RUST_VERSION: stable
  ARTIFACT_NAME: evetools-${{ github.sha }}-linux-x86_64.tar.gz

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate SSH deployment configuration
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required as a GitHub Actions secret"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Run backend tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked \
            -p evetools-domain \
            -p evetools-esi \
            -p evetools-db \
            -p evetools-api \
            -p evetools-http-api \
            -p evetools-worker

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release -p evetools-http-api --bin evetools-http-api
          cargo build --locked --release -p evetools-worker --bin sync-public-market-region

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp target/release/evetools-http-api dist/bin/evetools-http-api
          cp target/release/sync-public-market-region dist/bin/sync-public-market-region
          tar -C dist -czf "${ARTIFACT_NAME}" bin
          tar -tzf "${ARTIFACT_NAME}"

      - name: Prepare SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release artifact over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_ed25519 "${ARTIFACT_NAME}" "${SSH_USER}@${SSH_HOST}:/tmp/${ARTIFACT_NAME}"

      - name: Activate release over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "RELEASE_SHA='${GITHUB_SHA}' ARTIFACT_NAME='${ARTIFACT_NAME}' bash -s" <<'REMOTE'
          set -euo pipefail

          release_root="/opt/evetools/releases"
          release_dir="${release_root}/${RELEASE_SHA}"
          next_link="/opt/evetools/.current-${RELEASE_SHA}"
          archive_path="/tmp/${ARTIFACT_NAME}"

          sudo mkdir -p "${release_dir}"
          sudo tar --no-same-owner -xzf "${archive_path}" -C "${release_dir}"
          sudo chown -R root:root "${release_dir}"
          sudo chmod +x "${release_dir}/bin/evetools-http-api" "${release_dir}/bin/sync-public-market-region"
          sudo ln -sfn "${release_dir}" "${next_link}"
          sudo mv -Tf "${next_link}" /opt/evetools/current
          sudo systemctl daemon-reload
          sudo systemctl restart evetools-http-api.service
          sudo systemctl try-restart evetools-market-sync.timer || true
          rm -f "${archive_path}"
          REMOTE
