services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evetools_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "54329:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evetools_test"]
      interval: 2s
      timeout: 5s
      retries: 30
